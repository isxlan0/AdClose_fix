name: main

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '21'
          cache: gradle

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-core-${{ hashFiles('**/build.gradle.kts', '**/build.gradle', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-deps

      - name: Cache Gradle Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
            ~/.gradle/buildOutputCleanup/cache.properties
          key: gradle-builds-core-${{ github.sha }}
          restore-keys: |
            gradle-builds

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Install Android 36 SDK
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          sdkmanager_path="${sdk_root}/cmdline-tools/latest/bin/sdkmanager"

          yes | "${sdkmanager_path}" --licenses > /dev/null
          "${sdkmanager_path}" --install \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build with Gradle
        run: |
          echo ${{ secrets.SIGN_KEYSTORE_BASE64 }} | base64 -d > keystore.jks
          ./gradlew :app:assembleLsp100Release :app:assembleLsp101Release
        env:
          KEYSTORE_PATH: "../keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.SIGN_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}

      - name: Prepare APK Artifacts
        id: prepare_apks
        shell: bash
        run: |
          set -euo pipefail

          version_name="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n1)"
          apk_100_path="$(find app/build/outputs/apk/lsp100/release -maxdepth 1 -type f -name '*.apk' | head -n1)"
          apk_101_path="$(find app/build/outputs/apk/lsp101/release -maxdepth 1 -type f -name '*.apk' | head -n1)"

          if [ -z "$version_name" ] || [ -z "$apk_100_path" ] || [ -z "$apk_101_path" ]; then
            echo "Failed to resolve release APK artifacts."
            exit 1
          fi

          artifact_dir="dist"
          mkdir -p "$artifact_dir"

          artifact_100_name="AdClose-${version_name}-Api-100.apk"
          artifact_101_name="AdClose-${version_name}-Api-101.apk"

          cp "$apk_100_path" "$artifact_dir/$artifact_100_name"
          cp "$apk_101_path" "$artifact_dir/$artifact_101_name"

          echo "artifact_100_name=${artifact_100_name}" >> "$GITHUB_OUTPUT"
          echo "artifact_100_path=${artifact_dir}/${artifact_100_name}" >> "$GITHUB_OUTPUT"
          echo "artifact_101_name=${artifact_101_name}" >> "$GITHUB_OUTPUT"
          echo "artifact_101_path=${artifact_dir}/${artifact_101_name}" >> "$GITHUB_OUTPUT"

      - name: Upload API 100 Artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          name: ${{ steps.prepare_apks.outputs.artifact_100_name }}
          path: ${{ steps.prepare_apks.outputs.artifact_100_path }}
          compression-level: 0

      - name: Upload API 101 Artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          name: ${{ steps.prepare_apks.outputs.artifact_101_name }}
          path: ${{ steps.prepare_apks.outputs.artifact_101_path }}
          compression-level: 0
